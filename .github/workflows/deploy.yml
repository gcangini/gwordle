name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main  # Lo script parte ogni volta che fai push su main
      - dev # Lo script parte ogni volta che fai push su dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    env: # Se il branch è main, usa la produzione, altrimenti (dev) usa la cartella dev
      TARGET_DIR: ${{ github.ref == 'refs/heads/main' && '/var/www/gwordle/' || '/var/www/gw-dev/' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        with:          
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --exclude=.git" # do not "delete"
          # ARGS: "-rlgoDzvc -i --delete" # Sincronizza i file e cancella quelli eliminati
          TARGET: ${{ env.TARGET_DIR }} # La cartella del tuo sito sul Droplet
          EXCLUDE: "/.github/, /.git/, .env" # Cartelle e files da non caricare

      - name: Post-deployment fix permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.TARGET_DIR }}

            # 1. Crea la struttura 'writable' se manca
            mkdir -p writable/cache writable/logs writable/session writable/debugbar writable/uploads

            # 2. Installa le dipendenze
            composer install --no-dev --optimize-autoloader

            # 3. Ottimizza il framework
            php spark optimize

            # 4. Sistema i permessi
            sudo chown -R gcangini:www-data .
            sudo chmod -R 775 writable