name: "Feature Request"
description: "File a new idea for this project."
title: "[NEW feature]: ..."
labels: ["enhancement"]
projects: ["Shoplist"]
assignees:
  - gcangini
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request!
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: idea
    attributes:
      label: Describe the new feature you'd like
      description: A clear and concise description of what you want to happen.
      value: "Ex. I'd like ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: Also tell us how do you imagine it implemented (new buttons/actions/views...)
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? 
      description: If so, please provide a clear and concise description of what the problem is."
      value: " Ex. I'm always frustrated when [...]"
  - type: textarea
    id: other
    attributes:
      label: Additional context 
      description: Add any other context or info about the feature request here.
